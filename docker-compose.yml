services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # ports mapping is ignored due to network_mode: "host"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # It's recommended to use + to listen on all interfaces, so the app binds successfully even if the IP changes
      - ASPNETCORE_URLS=http://+:9622
    volumes:
      # - database:/app/Database
      - ./database:/app/Database // Local volume
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # Needed for ping sweeps to function correctly from container
    network_mode: "host"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # THIS IS CRITICAL: Next.js needs the variable here at build time!
      args:
        - NEXT_PUBLIC_API_URL=http://192.168.2.71:9622/api
    ports:
      - "9623:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://192.168.2.71:9622/api
    depends_on:
      - backend

  homelab-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: homelab-agent
    restart: unless-stopped
    ports:
      - "9624:8080" # Exposed agent port to Hub
    volumes:
      # Mount docker socket to read container stats
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Mount host root to read accurate host OS metrics (Disk)
      - /:/host:ro
      # Allow access to host proc for CPU/RAM
      - /proc:/host/proc:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # SECURITY: Provide the public key from the Hub dashboard configuration
      - HUB_PUBLIC_KEY=CHANGE_ME

