# =============================================================================
# HomeLab Info — All-in-One (Hub + Agent on the same machine)
# =============================================================================
# 1. Copy this file to your server
# 2. Edit the environment variables below
# 3. Run: docker compose up -d
# =============================================================================

services:
  homelabinfo:
    image: gfountopoulos/homelabinfo:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: homelabinfo
    restart: unless-stopped
    environment:
      # REQUIRED: Set this to your server's IP so the browser can reach the API.
      # Example: http://192.168.1.50:9622/api
      - API_URL=http://YOUR_SERVER_IP:9622/api
      # Optional: change default ports
      # - BACKEND_PORT=9622
      # - FRONTEND_PORT=3000
    volumes:
      # Persist the database on the host
      - ./database:/app/backend/Database
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # Required for network scanning (ARP/ping) to work correctly
    network_mode: "host"

  homelab-agent:
    image: gfountopoulos/homelabinfo-agent:latest
    # build:
    #   context: ./agent
    #   dockerfile: Dockerfile
    container_name: homelab-agent
    restart: unless-stopped
    ports:
      - "9624:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
      - /proc:/host/proc:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # REQUIRED: Paste the public key from your HomeLab Info dashboard
      - HUB_PUBLIC_KEY=CHANGE_ME
