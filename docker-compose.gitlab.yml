# =============================================================================
# HomeLab Info — GitLab Registry Test Compose
# =============================================================================
# Use this file to pull and test the images built by the GitLab CI pipeline
# BEFORE pushing them to Docker Hub.
#
# Usage:
#   1. Log in to the GitLab registry first:
#        docker login registry.gitlab.com
#
#   2. Set the TAG variable (defaults to "latest"):
#        TAG=v1.0.0.4 docker compose -f docker-compose.gitlab.yml up -d
#
#   3. Once validated, push to Docker Hub via the deploy.ps1 script or manually.
# =============================================================================

x-gitlab-registry: &gitlab-registry registry.gitlab.com/administration7242251/homelabinfo

services:
  homelabinfo:
    image: "${GITLAB_REGISTRY:-registry.gitlab.com/administration7242251/homelabinfo}/homelabinfo:${TAG:-latest}"
    container_name: homelabinfo-test
    restart: unless-stopped
    environment:
      - API_URL=http://192.168.2.71:9622/api
      # Optional: change default ports
      # - BACKEND_PORT=9622
      - FRONTEND_PORT=3000
    volumes:
      - ./database:/app/backend/Database
    network_mode: "host"
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE

  homelab-agent:
    image: "${GITLAB_REGISTRY:-registry.gitlab.com/administration7242251/homelabinfo}/homelabinfo-agent:${TAG:-latest}"
    container_name: homelab-agent-test
    restart: unless-stopped
    ports:
      - "9624:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
      - /proc:/host/proc:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # REQUIRED: Paste the public key from your HomeLab Info dashboard
      - HUB_PUBLIC_KEY=CHANGE_ME
