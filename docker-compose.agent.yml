# =============================================================================
# HomeLab Info — Agent Only
# =============================================================================
# Deploy this on any machine where you want to monitor Docker containers
# and host metrics. The agent reports back to the Hub.
#
# 1. Copy this file to the target machine
# 2. Set HUB_PUBLIC_KEY (from the Hub dashboard when you register this agent)
# 3. Run: docker compose -f docker-compose.agent.yml up -d
# =============================================================================

services:
  homelab-agent:
    image: yourusername/homelab-agent:latest
    # build:
    #   context: ./agent
    #   dockerfile: Dockerfile
    container_name: homelab-agent
    restart: unless-stopped
    ports:
      # Expose the agent port — the Hub will call this to fetch stats
      # Change the left side to use a different host port
      - "9624:8080"
    volumes:
      # Mount docker socket to read container stats
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Mount host root to read accurate host OS metrics (Disk)
      - /:/host:ro
      # Allow access to host proc for CPU/RAM
      - /proc:/host/proc:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # REQUIRED: Paste the public key from your HomeLab Info dashboard
      - HUB_PUBLIC_KEY=CHANGE_ME
