<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Deep Indigo to Electric Blue glow mapping -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>

    <!-- Outer Soft Neon Glow Filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Intense Core Glow Filter -->
    <filter id="coreGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark minimal background omitted for true transparency on app headers -->
  
  <g transform="translate(10, 10)">
    <!-- Main fluid swoosh 1 -->
    <path 
      d="M 50,40 C 130,-10 180,60 140,120 C 100,180 50,150 40,100 C 30,50 60,30 90,60" 
      fill="none" 
      stroke="url(#neonGradient)" 
      stroke-width="12" 
      stroke-linecap="round" 
      filter="url(#softGlow)" />
      
    <!-- Core high-intensity swoosh 1 -->
    <path 
      d="M 50,40 C 130,-10 180,60 140,120 C 100,180 50,150 40,100 C 30,50 60,30 90,60" 
      fill="none" 
      stroke="#FFFFFF" 
      stroke-width="3" 
      stroke-linecap="round" 
      opacity="0.6"
      filter="url(#coreGlow)" />

    <!-- Main fluid swoosh 2 (interconnected node) -->
    <path 
      d="M 140,40 C 60,-10 10,60 50,120 C 90,180 140,150 150,100 C 160,50 130,30 100,60" 
      fill="none" 
      stroke="url(#neonGradient)" 
      stroke-width="12" 
      stroke-linecap="round" 
      filter="url(#softGlow)" />
      
    <!-- Core high-intensity swoosh 2 -->
    <path 
      d="M 140,40 C 60,-10 10,60 50,120 C 90,180 140,150 150,100 C 160,50 130,30 100,60" 
      fill="none" 
      stroke="#FFFFFF" 
      stroke-width="3" 
      stroke-linecap="round" 
      opacity="0.6"
      filter="url(#coreGlow)" />
      
    <!-- Abstract connected networking nodes -->
    <circle cx="50" cy="40" r="14" fill="#09090b" stroke="url(#neonGradient)" stroke-width="4" filter="url(#softGlow)" />
    <circle cx="50" cy="40" r="6" fill="#60A5FA" filter="url(#coreGlow)" />

    <circle cx="140" cy="40" r="10" fill="#09090b" stroke="url(#neonGradient)" stroke-width="4" filter="url(#softGlow)" />
    <circle cx="140" cy="40" r="4" fill="#8B5CF6" filter="url(#coreGlow)" />

    <circle cx="95" cy="140" r="12" fill="#09090b" stroke="url(#neonGradient)" stroke-width="4" filter="url(#softGlow)" />
    <circle cx="95" cy="140" r="5" fill="#3B82F6" filter="url(#coreGlow)" />
  </g>
</svg>
