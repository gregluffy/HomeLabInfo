# =============================================================================
# HomeLab Info — GitLab CI/CD Pipeline
# =============================================================================
# Triggered automatically when a Git tag is pushed (e.g. v1.0.0.4).
#
# Stages:
#   1. build-app   → Build the frontend+backend combined image
#   2. build-agent → Build the agent image
#   3. push        → Push both images to the GitLab Container Registry
#
# Required CI/CD Variables (set in GitLab → Settings → CI/CD → Variables):
#   CI_REGISTRY_USER     → your GitLab username (auto-provided by GitLab)
#   CI_REGISTRY_PASSWORD → your GitLab token   (auto-provided by GitLab)
#   CI_REGISTRY          → registry.gitlab.com  (auto-provided by GitLab)
#
# The runner on your local network must have Docker available (shell or
# docker executor with privileged mode OR docker-in-docker via dind).
# =============================================================================

variables:
  # -- Image names in the GitLab Container Registry --
  # They resolve to: registry.gitlab.com/administration7242251/homelabinfo/homelabinfo:<tag>
  APP_IMAGE:   "$CI_REGISTRY_IMAGE/homelabinfo"
  AGENT_IMAGE: "$CI_REGISTRY_IMAGE/homelabinfo-agent"

  # Use Docker BuildKit for faster, cache-friendly builds
  DOCKER_BUILDKIT: "1"

  # Runner uses Docker socket binding (/var/run/docker.sock mounted).
  # This tells the Docker CLI inside the job container to use the host daemon.
  DOCKER_HOST: "unix:///var/run/docker.sock"

# ─── Only run when a tag is pushed ───────────────────────────────────────────
workflow:
  rules:
    - if: $CI_COMMIT_TAG

# ─── Stages ──────────────────────────────────────────────────────────────────
stages:
  - build-app
  - build-agent

# ─── Shared login helper ─────────────────────────────────────────────────────
.docker_login: &docker_login
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

# =============================================================================
# Job 1 — Build & push the main app image (frontend + backend)
# =============================================================================
build-app:
  stage: build-app
  image: docker:27
  # No dind service — the runner already has /var/run/docker.sock mounted
  tags:
    - docker
  <<: *docker_login
  script:
    - echo "Building app image for tag $CI_COMMIT_TAG"
    - |
      docker build \
        --file Dockerfile \
        --tag "$APP_IMAGE:$CI_COMMIT_TAG" \
        --tag "$APP_IMAGE:latest" \
        .
    - docker push "$APP_IMAGE:$CI_COMMIT_TAG"
    - docker push "$APP_IMAGE:latest"
    - echo "App image pushed → $APP_IMAGE:$CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG

# =============================================================================
# Job 2 — Build & push the agent image
# =============================================================================
build-agent:
  stage: build-agent
  image: docker:27
  # No dind service — the runner already has /var/run/docker.sock mounted
  tags:
    - homelab          # ← replace with YOUR runner tag
  <<: *docker_login
  script:
    - echo "Building agent image for tag $CI_COMMIT_TAG"
    - |
      docker build \
        --file agent/Dockerfile \
        --tag "$AGENT_IMAGE:$CI_COMMIT_TAG" \
        --tag "$AGENT_IMAGE:latest" \
        ./agent
    - docker push "$AGENT_IMAGE:$CI_COMMIT_TAG"
    - docker push "$AGENT_IMAGE:latest"
    - echo "Agent image pushed → $AGENT_IMAGE:$CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG
