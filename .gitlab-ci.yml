# =============================================================================
# HomeLab Info — GitLab CI/CD Pipeline
# =============================================================================
# Triggered automatically when a Git tag is pushed.
#
# Tag behaviour:
#   *-RC* tags  → build multi-arch images, push to GitLab Registry only
#   all others  → build multi-arch images, push to GitLab Registry + Docker Hub
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   Auto-provided by GitLab:
#     CI_REGISTRY_USER     – GitLab username
#     CI_REGISTRY_PASSWORD – GitLab token
#     CI_REGISTRY          – registry.gitlab.com
#
#   Add manually (protect + mask DOCKERHUB_TOKEN):
#     DOCKERHUB_USERNAME   – Docker Hub username  (e.g. gfountopoulos)
#     DOCKERHUB_TOKEN      – Docker Hub access token
#
# Runner requirement: shell/docker executor with /var/run/docker.sock mounted
#   and privileged access (needed for QEMU binfmt registration).
# =============================================================================

variables:
  # GitLab Container Registry image names
  APP_IMAGE:   "$CI_REGISTRY_IMAGE/homelabinfo"
  AGENT_IMAGE: "$CI_REGISTRY_IMAGE/homelabinfo-agent"

  # Docker Hub image names
  HUB_APP:   "gfountopoulos/homelabinfo"
  HUB_AGENT: "gfountopoulos/homelabinfo-agent"

  DOCKER_HOST:     "unix:///var/run/docker.sock"
  DOCKER_BUILDKIT: "1"

# ─── Only run on tag pushes ───────────────────────────────────────────────────
workflow:
  rules:
    - if: $CI_COMMIT_TAG

# ─── Stages ──────────────────────────────────────────────────────────────────
stages:
  - build-app
  - build-agent

# ─── Shared: QEMU + buildx bootstrap ─────────────────────────────────────────
# Registers ARM binfmt handlers on the host daemon so cross-compilation works.
# Uses the docker-container driver (spawns a BuildKit container) which is more
# reliable for multi-arch than the default docker driver.
.setup_buildx: &setup_buildx
  - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
  - docker buildx rm multiarch-builder 2>/dev/null || true
  - docker buildx create --use --driver docker-container --name multiarch-builder
  - docker buildx inspect --bootstrap

# =============================================================================
# Job 1 — Build & push the main app image (frontend + backend)
# =============================================================================
build-app:
  stage: build-app
  image: docker:27
  tags:
    - docker
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - *setup_buildx
  script:
    - |
      echo "Building app image for tag: $CI_COMMIT_TAG"

      # Always push to GitLab Registry
      TAGS="-t $APP_IMAGE:$CI_COMMIT_TAG -t $APP_IMAGE:latest"

      # Push to Docker Hub only for release tags (no -RC in tag name)
      if ! echo "$CI_COMMIT_TAG" | grep -q -- "-RC"; then
        echo "Release tag detected — also pushing to Docker Hub"
        docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"
        TAGS="$TAGS -t $HUB_APP:$CI_COMMIT_TAG -t $HUB_APP:latest"
      else
        echo "RC tag detected — skipping Docker Hub push"
      fi

      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        $TAGS \
        --push \
        -f Dockerfile \
        .

      echo "Done → $APP_IMAGE:$CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG

# =============================================================================
# Job 2 — Build & push the agent image
# =============================================================================
build-agent:
  stage: build-agent
  image: docker:27
  tags:
    - docker
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - *setup_buildx
  script:
    - |
      echo "Building agent image for tag: $CI_COMMIT_TAG"

      # Always push to GitLab Registry
      TAGS="-t $AGENT_IMAGE:$CI_COMMIT_TAG -t $AGENT_IMAGE:latest"

      # Push to Docker Hub only for release tags (no -RC in tag name)
      if ! echo "$CI_COMMIT_TAG" | grep -q -- "-RC"; then
        echo "Release tag detected — also pushing to Docker Hub"
        docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"
        TAGS="$TAGS -t $HUB_AGENT:$CI_COMMIT_TAG -t $HUB_AGENT:latest"
      else
        echo "RC tag detected — skipping Docker Hub push"
      fi

      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        $TAGS \
        --push \
        -f agent/Dockerfile \
        ./agent

      echo "Done → $AGENT_IMAGE:$CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG
