# =============================================================================
# HomeLab Info — Hub Only (Frontend + Backend)
# =============================================================================
# Deploy this on your main server. Run agents separately on other machines
# using docker-compose.agent.yml.
#
# 1. Copy this file to your server
# 2. Edit the environment variables below
# 3. Run: docker compose -f docker-compose.hub.yml up -d
# =============================================================================

services:
  homelabinfo:
    image: gfountopoulos/homelabinfo:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: homelabinfo
    restart: unless-stopped
    environment:
      # REQUIRED: Set this to your server's IP so the browser can reach the API.
      # Example: http://192.168.1.50:9622/api
      - API_URL=http://YOUR_SERVER_IP:9622/api
      # Optional: change default ports
      # - BACKEND_PORT=9622
      # - FRONTEND_PORT=3000
    volumes:
      # Persist the database on the host
      - ./database:/app/backend/Database
    network_mode: "host"
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
